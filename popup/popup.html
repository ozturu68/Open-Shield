<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>openShield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <img src="../icons/shield-on-32.png" alt="" width="18" height="18">
      <span>openShield</span>
      <button id="btn-opt" aria-label="Settings" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82V9a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>

    <div id="restricted" class="hidden">
      <p class="muted">Shields are not available on browser pages.</p>
    </div>

    <div id="main">
      <div class="site-row">
        <div class="site-info">
          <div id="hostname" class="hostname">example.com</div>
          <div id="status-text" class="status-text">Shields are up</div>
          <div id="status-desc" class="status-desc"></div>
        </div>
        <label class="switch">
          <input type="checkbox" id="master" checked>
          <span class="track"></span>
        </label>
      </div>

      <div class="stats">
        <div class="stat-item"><strong id="c-blocked">0</strong><span>Blocked</span></div>
        <div class="stat-item"><strong id="c-upgraded">0</strong><span>Upgraded</span></div>
        <div class="stat-item"><strong id="c-bounces">0</strong><span>Bounces</span></div>
      </div>

      <div id="protection-badges" class="badges">
        <span id="badge-ads" class="badge badge-on">Ads</span>
        <span id="badge-fp" class="badge badge-on">Fingerprint</span>
        <span id="badge-params" class="badge badge-on">Params</span>
        <span id="badge-cookies" class="badge badge-on">Cookies</span>
      </div>

      <div class="controls">
        <div class="row">
          <span class="control-label">Block 3rd-party scripts</span>
          <label class="switch small"><input type="checkbox" id="toggle-3p"><span class="track"></span></label>
        </div>
        <div class="row">
          <span class="control-label">Disable JavaScript</span>
          <label class="switch small"><input type="checkbox" id="toggle-js"><span class="track"></span></label>
        </div>
      </div>

      <div id="reload" class="reload hidden">
        <span>Reload the page to apply</span>
        <button id="btn-reload">Reload</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
